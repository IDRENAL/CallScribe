<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CallScribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0e10; --panel:#16161a; --panel2:#1d1d22; --border:#2a2a31;
    --fg:#e6e6e8; --muted:#8a8a95; --accent:#00e5a0; --err:#ff5d5d; --warn:#ffce5a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font-family:"JetBrains Mono",monospace;font-size:13px}
  h1,h2,h3{font-family:"Unbounded",sans-serif;margin:0}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;
         border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:20px;letter-spacing:.5px}
  header .accent{color:var(--accent)}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--err);
       box-shadow:0 0 8px var(--err);transition:all .3s}
  .dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .status{margin-left:auto;color:var(--muted);display:flex;align-items:center;gap:8px}
  .layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 57px)}
  aside{border-right:1px solid var(--border);background:var(--panel);
        overflow-y:auto;padding:16px}
  aside section{margin-bottom:22px}
  aside h3{font-size:12px;color:var(--muted);text-transform:uppercase;
           letter-spacing:1px;margin-bottom:10px;font-family:"JetBrains Mono"}
  button{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid var(--border);
         background:var(--panel2);color:var(--fg);padding:9px 12px;border-radius:8px;
         width:100%;margin-bottom:8px;transition:all .15s}
  button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--accent);color:#04130d;border-color:var(--accent);font-weight:600}
  button.danger{border-color:var(--err);color:var(--err)}
  .timer{font-size:22px;text-align:center;margin:6px 0;color:var(--accent);
         font-variant-numeric:tabular-nums}
  .file-list{display:flex;flex-direction:column;gap:6px}
  .file{padding:9px 10px;border:1px solid var(--border);border-radius:8px;
        background:var(--panel2);cursor:pointer;transition:all .15s}
  .file:hover{border-color:var(--accent)}
  .file.sel{border-color:var(--accent);background:#13241d}
  .file .date{font-weight:600}
  .file .meta{color:var(--muted);font-size:11px;margin-top:3px;display:flex;
              gap:8px;flex-wrap:wrap}
  .badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#222}
  .badge.ok{background:#0c2a20;color:var(--accent)}
  main{display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel)}
  .tab{padding:12px 20px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .progress{height:3px;background:var(--panel2);display:none}
  .progress.show{display:block}
  .progress .bar{height:100%;width:0;background:var(--accent);transition:width .3s}
  .panels{flex:1;overflow:hidden;position:relative}
  .panel{position:absolute;inset:0;overflow-y:auto;padding:20px;display:none}
  .panel.active{display:block}
  #log{font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .log-line{padding:1px 0}
  .log-line.ok{color:var(--accent)}
  .log-line.err{color:var(--err)}
  .log-line.warn{color:var(--warn)}
  .log-line.info{color:var(--fg)}
  .viewer{line-height:1.7}
  .viewer h1{font-size:22px;margin:8px 0 16px}
  .viewer h2{font-size:16px;margin:18px 0 8px;color:var(--accent)}
  .viewer hr{border:none;border-top:1px solid var(--border);margin:14px 0}
  .viewer code{background:var(--panel2);padding:1px 5px;border-radius:4px}
  .viewer strong{color:var(--accent)}
  .action-bar{margin-top:18px;display:flex;gap:8px}
  .action-bar button{width:auto}
  .empty{color:var(--muted);text-align:center;margin-top:40px}
</style>
</head>
<body>
<header>
  <h1>Call<span class="accent">Scribe</span></h1>
  <div class="status"><span id="dot" class="dot"></span><span id="conn">подключение…</span></div>
</header>

<div class="layout">
  <aside>
    <section>
      <h3>Запись</h3>
      <div class="timer" id="timer">00:00</div>
      <button id="btnRec" class="primary" onclick="startRec()">● Начать запись</button>
      <button id="btnStop" class="danger" onclick="stopRec()" disabled>■ Стоп</button>
    </section>
    <section>
      <h3>Обработка</h3>
      <button id="btnTranscribe" onclick="transcribe()" disabled>Транскрибировать</button>
      <button id="btnProcess" onclick="processAll()" disabled>Обработать (всё)</button>
    </section>
    <section>
      <h3>Записи</h3>
      <div class="file-list" id="files"><div class="empty">нет записей</div></div>
    </section>
  </aside>

  <main>
    <div class="tabs">
      <div class="tab active" data-tab="log" onclick="switchTab('log')">Лог</div>
      <div class="tab" data-tab="transcript" onclick="switchTab('transcript')">Стенограмма</div>
      <div class="tab" data-tab="summary" onclick="switchTab('summary')">Выжимка</div>
    </div>
    <div class="progress" id="progress"><div class="bar" id="bar"></div></div>
    <div class="panels">
      <div class="panel active" id="panel-log"><div id="log"></div></div>
      <div class="panel" id="panel-transcript">
        <div class="viewer" id="transcriptView"><div class="empty">выбери запись со стенограммой</div></div>
        <div class="action-bar" id="transcriptActions" style="display:none">
          <button onclick="openFile('transcript')">Открыть в редакторе</button>
        </div>
      </div>
      <div class="panel" id="panel-summary">
        <div class="viewer" id="summaryView"><div class="empty">выжимка появится в v2.0</div></div>
      </div>
    </div>
  </main>
</div>

<script>
let ws, selectedStem=null, recording=false, busy=false;
let timerInt=null, timerSec=0;
const lastFile={transcript:null, summary:null};

function connectWS(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('dot').classList.add('on');
                 document.getElementById('conn').textContent='подключено';};
  ws.onmessage=e=>handleMessage(JSON.parse(e.data));
  ws.onclose=()=>{document.getElementById('dot').classList.remove('on');
                  document.getElementById('conn').textContent='переподключение…';
                  setTimeout(connectWS,1000);};
}

function handleMessage(msg){
  switch(msg.type){
    case 'log': appendLog(msg.text,msg.level); break;
    case 'recording_started': setRecordingUI(true); break;
    case 'recording_stopped': setRecordingUI(false); break;
    case 'job_started': showProgress(msg.label); setBusy(true); break;
    case 'job_progress': setProgress(msg.pct,msg.label); break;
    case 'job_done': onJobDone(msg); break;
    case 'job_error': onJobError(msg.error); break;
    case 'files': renderFiles(msg.files); break;
  }
}

function appendLog(text,level){
  const log=document.getElementById('log');
  const d=document.createElement('div');
  d.className='log-line '+(level||'info');
  d.textContent=text;
  log.appendChild(d);
  log.parentElement.scrollTop=log.parentElement.scrollHeight;
}

function setRecordingUI(on){
  recording=on;
  document.getElementById('btnRec').disabled=on;
  document.getElementById('btnStop').disabled=!on;
  if(on){startTimer();}else{stopTimer();}
  updateButtons();
}
function setBusy(on){busy=on; if(!on){hideProgress();} updateButtons();}
function updateButtons(){
  const lock=recording||busy;
  document.getElementById('btnRec').disabled=lock;
  document.getElementById('btnTranscribe').disabled=lock||!selectedStem;
  document.getElementById('btnProcess').disabled=lock||!selectedStem;
}

function startTimer(){timerSec=0;timerInt=setInterval(()=>{timerSec++;
  const m=String(Math.floor(timerSec/60)).padStart(2,'0');
  const s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timer').textContent=`${m}:${s}`;},1000);}
function stopTimer(){clearInterval(timerInt);}

function showProgress(label){const p=document.getElementById('progress');
  p.classList.add('show');setProgress(null,label);}
function hideProgress(){document.getElementById('progress').classList.remove('show');
  document.getElementById('bar').style.width='0';}
function setProgress(pct,label){
  if(pct!=null)document.getElementById('bar').style.width=pct+'%';
  else document.getElementById('bar').style.width='40%';
  if(label)appendLog('› '+label,'info');
}

function onJobDone(msg){
  setBusy(false);
  appendLog('✓ '+(msg.label||'Готово'),'ok');
  if(msg.content_type==='transcript'){
    lastFile.transcript=msg.file_path;
    renderViewer('transcript',msg.content);
    switchTab('transcript');
  }
  refreshFiles();
}
function onJobError(err){setBusy(false);appendLog('✗ '+err,'err');}

function renderFiles(files){
  const c=document.getElementById('files');
  if(!files||!files.length){c.innerHTML='<div class="empty">нет записей</div>';return;}
  c.innerHTML='';
  files.forEach(f=>{
    const el=document.createElement('div');
    el.className='file'+(f.stem===selectedStem?' sel':'');
    el.onclick=()=>selectFile(f.stem);
    el.innerHTML=`<div class="date">${f.date}</div>
      <div class="meta"><span>${f.size_mb} MB</span>
      <span class="badge${f.has_transcript?' ok':''}">стенограмма</span>
      <span class="badge${f.has_summary?' ok':''}">выжимка</span></div>`;
    c.appendChild(el);
  });
}

function selectFile(stem){
  selectedStem=stem;
  document.querySelectorAll('.file').forEach(e=>e.classList.remove('sel'));
  refreshFiles();
  updateButtons();
  loadContent('transcript');
}

async function loadContent(type){
  if(!selectedStem)return;
  const r=await fetch(`/api/content?type=${type}&stem=${selectedStem}`);
  const j=await r.json();
  if(j.ok){lastFile[type]=j.file_path;renderViewer(type,j.content);}
  else{renderViewer(type,null);}
}
function renderViewer(type,content){
  const view=document.getElementById(type==='transcript'?'transcriptView':'summaryView');
  const actions=document.getElementById('transcriptActions');
  if(!content){view.innerHTML='<div class="empty">нет данных</div>';
    if(type==='transcript')actions.style.display='none';return;}
  view.innerHTML=mdToHtml(content);
  if(type==='transcript')actions.style.display='flex';
}

function mdToHtml(md){
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n/g,'<br>');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='summary'&&selectedStem)loadContent('summary');
}

async function post(url,body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:body?JSON.stringify(body):'{}'});
  return r.json();
}
async function startRec(){const j=await post('/api/record/start');
  if(!j.ok)appendLog('✗ Занято: '+(j.reason||''),'err');}
async function stopRec(){await post('/api/record/stop');}
async function transcribe(){if(!selectedStem)return;
  const j=await post('/api/transcribe',{stem:selectedStem});
  if(!j.ok)appendLog('✗ '+(j.reason||'ошибка'),'err');}
async function processAll(){if(!selectedStem)return;
  const j=await post('/api/process',{stem:selectedStem});
  if(!j.ok)appendLog('✗ '+(j.reason||'ошибка'),'err');}
async function openFile(type){const path=lastFile[type];if(!path)return;
  await post('/api/open',{path});}
async function refreshFiles(){const r=await fetch('/api/files');renderFiles(await r.json());}

connectWS();
refreshFiles();
</script>
</body>
</html>
